services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: atsmile_api_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ./bin/rails server -b 0.0.0.0
    volumes:
      - .:/rails
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/atsmile_api_development
      RAILS_ENV: development
    depends_on:
      - db

volumes:
  postgres_data:
