services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: atsmile_api_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ./bin/rails server -b 0.0.0.0
    volumes:
      - .:/rails
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/atsmile_api_development
      RAILS_ENV: development
      TEST_DATABASE_URL: postgresql://postgres:password@db:5432/atsmile_api_test
    depends_on:
      - db

  frontend:
    build:
      context: ../portfolio
      dockerfile: Dockerfile.dev
    volumes:
      - ../portfolio:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data:
