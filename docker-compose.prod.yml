services:
  db:
    image: postgres:16
    container_name: atsmile-api-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: atsmile_api_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atsmile-api
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/atsmile_api_production
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    depends_on:
      - db
    restart: unless-stopped
volumes:
  postgres_data:
